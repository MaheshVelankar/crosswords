<head>

<body>

<h1>Crossword Puzzle made again</h1>

<div class="crossword-puzzle-frame">
    <div id="cw-box" class="crossword-puzzle-box">
    </div>
</div>

<div id="clues">
  <h2>Clues</h2>
  <div>
    <strong>Across</strong>
    <ul>
      <li>1. Opposite of cold (3)</li>
      <li>3. Day before today (9)</li>
    </ul>
  </div>
  <div>
    <strong>Down</strong>
    <ul>
      <li>1. Bright star at center of solar system (3)</li>
      <li>2. Frozen water (3)</li>
    </ul>
  </div>
</div>
