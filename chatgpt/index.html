<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Crossword</title>
        <link rel="stylesheet" href="crossword.css">
    </head>

    <body>

        <div class="page">

            <header>

                <h1 class="title">Daily Crossword</h1>

                <div class="puzzle-picker">
                    <label>Select Puzzle:</label>
                    <select>
                        <option>Sample Puzzle</option>
                        <option>Marathi Crossword</option>
                        <option>Cryptic #1</option>
                    </select>
                </div>

            </header>


            <!-- CURRENT CLUE (mobile only) -->

            <div class="current-clue">
                <span class="clue-number">1</span>
                <span class="clue-direction">Across</span> :
                <span class="clue-text">Greeting</span>
            </div>


            <div class="game-layout">

                <div class="grid-area">

                    <div class="grid">

                        <div class="cell"><span class="number">1</span></div>
                        <div class="cell"></div>
                        <div class="cell"></div>
                        <div class="cell black"></div>
                        <div class="cell"></div>

                        <div class="cell"></div>
                        <div class="cell"></div>
                        <div class="cell black"></div>
                        <div class="cell"></div>
                        <div class="cell"></div>

                        <div class="cell"></div>
                        <div class="cell"></div>
                        <div class="cell"></div>
                        <div class="cell"></div>
                        <div class="cell black"></div>

                    </div>

                </div>


                <div class="clue-area">

                    <div class="clue-section">

                        <h2>Across</h2>

                        <ol>
                            <li>Greeting</li>
                            <li>Planet we live on</li>
                            <li>Example clue text</li>
                        </ol>

                    </div>

                    <div class="clue-section">

                        <h2>Down</h2>

                        <ol>
                            <li>Opposite of goodbye</li>
                            <li>Another clue</li>
                            <li>Yet another clue</li>
                        </ol>

                    </div>

                </div>

            </div>

        </div>


        <!-- VIRTUAL KEYBOARD -->

        <div class="keyboard">

            <div class="keyrow">
                <button>Q</button>
                <button>W</button>
                <button>E</button>
                <button>R</button>
                <button>T</button>
                <button>Y</button>
                <button>U</button>
                <button>I</button>
                <button>O</button>
                <button>P</button>
            </div>

            <div class="keyrow">
                <button>A</button>
                <button>S</button>
                <button>D</button>
                <button>F</button>
                <button>G</button>
                <button>H</button>
                <button>J</button>
                <button>K</button>
                <button>L</button>
            </div>

            <div class="keyrow">
                <button>Z</button>
                <button>X</button>
                <button>C</button>
                <button>V</button>
                <button>B</button>
                <button>N</button>
                <button>M</button>
                <button class="wide">⌫</button>
            </div>

        </div>

    </body>
</html>
