<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/mano-keyboard.css">
    </head>
    <body>
        <input class="vk-input" type="text"><br>
        <input class="vk-input" type="text"><br>
        <input class="vk-input" type="text">
        <div class="segmented-control-no">
            <input type="radio" name="toggle-group" id="opt-1" checked>
            <label for="opt-1">Current</label>

            <input type="radio" name="toggle-group" id="opt-2">
            <label for="opt-2">Future</label>

            <div class="selection-slider"></div>
        </div>

        <div id="vkHelpOverlay">
            <div id="vkHelpBox">
                <div class="vk-help-header">
                    <span>Keyboard Help</span>
                    <button id="vkHelpClose">✕</button>
                </div>
                <div class="vk-help-content">
                    <h3>Typing</h3>
                    <p>Tap keys to insert characters.</p>
                    <h3>Shift</h3>
                    <p>Use ⇧ to toggle uppercase letters.</p>
                    <h3>Transliteration</h3>
                    <p>Press <b>अ</b> to convert Roman typing into Devanagari.</p>
                    <h3>Done</h3>
                    <p>Press ✓ to close the keyboard.</p>
                </div>
            </div>
        </div>


        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <script src="js/mano-keyboard.js"></script>
        <script>
            $(function(){
                $(".vk-input").virtualKeyboard();
            });
        </script>
    </body>
</html>
